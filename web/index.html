<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#5b21b6" />
  <title>Leon Pay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --card: rgba(255, 255, 255, 0.96);
      --ink: #1f2937;
      --muted: #6b7280;
    }
    * { box-sizing: border-box; }
    html { height: 100%; }
    body { margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(-45deg, #6d28d9, #db2777, #2563eb, #059669);
      background-size: 400% 400%;
      background-attachment: fixed;
      animation: gradientShift 16s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 24px;
      min-height: 100vh;
      min-height: 100dvh;
      color: var(--ink);
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @media (prefers-reduced-motion: reduce) {
      body { animation: none; }
    }
    .brand {
      font-family: "Fredoka", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 700;
      font-size: clamp(30px, 8vw, 48px);
      color: #fff;
      margin: 0;
      text-align: center;
      letter-spacing: 0.5px;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 24px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      animation: pop 0.4s ease;
    }
    @keyframes pop {
      from { transform: scale(0.96); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .emoji { font-size: 64px; line-height: 1; margin-bottom: 16px; }
    h1 { font-size: 24px; margin: 0 0 12px; }
    p { font-size: 17px; line-height: 1.5; color: var(--muted); margin: 0; }
    .spinner {
      width: 44px; height: 44px; margin: 8px auto 0;
      border: 4px solid rgba(109, 40, 217, 0.2);
      border-top-color: #6d28d9;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint { margin-top: 20px; font-size: 14px; color: #9ca3af; }
    .refresh-btn {
      margin-top: 24px;
      font-family: "Fredoka", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 600;
      font-size: 16px;
      color: #fff;
      background: linear-gradient(135deg, #6d28d9, #db2777);
      border: none;
      border-radius: 999px;
      padding: 13px 26px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(109, 40, 217, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .refresh-btn:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 12px 26px rgba(219, 39, 119, 0.45);
    }
    .refresh-btn:active { transform: translateY(0) scale(0.97); }
    .refresh-icon { display: inline-block; }
    .refresh-btn:hover .refresh-icon { animation: spin 0.7s linear infinite; }

    /* Falling emoji effect */
    .rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 9999;
    }
    .rain span {
      position: absolute;
      top: -12vh;
      will-change: transform;
      animation: fall linear infinite;
      filter: drop-shadow(0 3px 4px rgba(0, 0, 0, 0.2));
    }
    @keyframes fall {
      0% { transform: translateY(-12vh) rotate(0deg); opacity: 0; }
      8% { opacity: 1; }
      100% { transform: translateY(112vh) rotate(360deg); opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      .rain { display: none; }
    }

    /* Landing page: two token boxes */
    .tokens {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      width: 100%;
      max-width: 720px;
    }
    .token-box {
      flex: 1 1 240px;
      max-width: 320px;
      background: var(--card);
      border-radius: 24px;
      padding: 24px 20px 20px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      animation: pop 0.4s ease both;
    }
    .token-box:nth-child(2) { animation-delay: 0.1s; }
    .token-label {
      font-family: "Fredoka", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 600;
      font-size: 22px;
      color: var(--ink);
      margin-bottom: 14px;
    }
    .qr {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
    }
    .qr img, .qr canvas { width: 100%; height: 100%; display: block; }
    .token-cap {
      margin-top: 14px;
      font-family: "Fredoka", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 500;
      font-size: 15px;
      color: var(--muted);
    }
    [hidden] { display: none !important; }

    @media (max-width: 560px) {
      body { gap: 18px; padding: 16px; }
      .brand { font-size: clamp(24px, 8vw, 36px); }
      .tokens { gap: 16px; }
      .token-box {
        flex-basis: 100%;
        max-width: 420px;
        padding: 18px 16px 16px;
      }
      .token-label { font-size: 20px; }
      .card { padding: 32px 20px; }
    }
  </style>
</head>
<body>
  <h1 class="brand">Welcome to Leon Pay</h1>

  <section class="tokens" id="tokens" hidden>
    <div class="token-box">
      <div class="token-label">Token 1</div>
      <div class="qr" id="qr-A"></div>
      <div class="token-cap">Scan me!</div>
    </div>
    <div class="token-box">
      <div class="token-label">Token 2</div>
      <div class="qr" id="qr-B"></div>
      <div class="token-cap">Scan me!</div>
    </div>
  </section>

  <main class="card" id="card" hidden>
    <div class="emoji" id="emoji">🎁</div>
    <h1 id="title">Checking your token…</h1>
    <p id="message"><span class="spinner"></span></p>
    <div class="hint" id="hint"></div>
    <button class="refresh-btn" id="refresh" type="button" hidden>
      <span class="refresh-icon">🔄</span> Refresh this page
    </button>
  </main>

  <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@master/qrcode.min.js"></script>
  <script>
    const SCAN_ENDPOINT = "https://zvebvvqywwhflbbrgzkf.supabase.co/functions/v1/scan";

    const TOKENS = {
      A: "93ef95eccf1ae899f74e0271ed8397fa",
      B: "8257d4976487b680c6d0bdc360d62b18",
    };

    const VIEWS = {
      first: {
        emoji: "✨",
        title: "One down!",
        message: "Now scan the other token to unlock your gift.",
      },
      already_scanned: {
        emoji: "👀",
        title: "You already scanned this token",
        message: "Scan the other one to continue.",
      },
      both: {
        emoji: "🎉",
        title: "Both tokens scanned!",
        message: "Birthday funds are being transferred to your bank account. This may take a few hours.",
        note: "This page will change when completed.",
        refresh: true,
      },
      transferred: {
        emoji: "🥳",
        title: "All done!",
        message: "Your tokens have been transferred. Enjoy!",
      },
      invalid: {
        emoji: "🤔",
        title: "Hmm, that token isn't valid",
        message: "Double-check you scanned the right code.",
      },
      error: {
        emoji: "😵",
        title: "Something went wrong",
        message: "Please try scanning again in a moment.",
      },
    };

    const RAIN = {
      both: ["🕐", "🕒", "🕔", "🕖", "🕘", "⏰", "⏳"],
      transferred: ["💵", "💰", "💸", "🪙", "💷"],
    };

    function clearRain() {
      const existing = document.getElementById("rain");
      if (existing) existing.remove();
    }

    function startRain(emojis) {
      clearRain();
      const layer = document.createElement("div");
      layer.className = "rain";
      layer.id = "rain";
      for (let i = 0; i < 26; i++) {
        const drop = document.createElement("span");
        drop.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        drop.style.left = Math.random() * 100 + "vw";
        drop.style.fontSize = 22 + Math.random() * 24 + "px";
        const duration = 4 + Math.random() * 4;
        drop.style.animationDuration = duration + "s";
        drop.style.animationDelay = -Math.random() * duration + "s";
        layer.appendChild(drop);
      }
      document.body.appendChild(layer);
    }

    function render(state) {
      const view = VIEWS[state] || VIEWS.error;
      document.getElementById("emoji").textContent = view.emoji;
      document.getElementById("title").textContent = view.title;
      document.getElementById("message").textContent = view.message;
      document.getElementById("hint").textContent = view.note || "";
      document.getElementById("refresh").hidden = !view.refresh;
      if (RAIN[state]) {
        startRain(RAIN[state]);
      } else {
        clearRain();
      }
    }

    document.getElementById("refresh").addEventListener("click", function () {
      window.location.reload();
    });

    async function scan(token) {
      document.getElementById("card").hidden = false;
      try {
        const res = await fetch(SCAN_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
        });
        const data = await res.json();
        render(data.state || "error");
      } catch (e) {
        render("error");
      }
    }

    function showTokens() {
      document.getElementById("tokens").hidden = false;
      const base = window.location.origin + window.location.pathname;
      const targets = { A: "qr-A", B: "qr-B" };
      for (const [label, id] of Object.entries(targets)) {
        const url = base + "?t=" + TOKENS[label];
        const box = document.getElementById(id);
        box.textContent = "";
        if (window.QRCode) {
          new QRCode(box, {
            text: url,
            width: 320,
            height: 320,
            colorDark: "#1f2937",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H,
          });
        } else {
          box.textContent = url;
        }
      }
    }

    const params = new URLSearchParams(window.location.search);
    const token = params.get("t") || params.get("token");
    if (token) {
      scan(token);
    } else {
      showTokens();
    }
  </script>
</body>
</html>
